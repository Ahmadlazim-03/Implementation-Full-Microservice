version: "3.9"

# ============================================================================
# Database per Service + Polyglot Persistence
# ----------------------------------------------------------------------------
# auth-service     -> PostgreSQL (ACID, unique email constraint, strong consistency)
# places-service   -> MongoDB    (geospatial via 2dsphere, flexible schema)
# review-service   -> MongoDB    (append-mostly, document model fit)
# (shared)         -> Redis      (cache decorator, session blacklist, rate limit)
#
# Each DB volume is isolated -> services are independent and scalable.
# ============================================================================

services:
  # ---------- Auth Service DB ----------
  postgres-auth:
    image: postgres:16-alpine
    container_name: kampusmap-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: kampusmap_auth
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  # ---------- Places Service DB ----------
  mongo-places:
    image: mongo:7
    container_name: kampusmap-mongo-places
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_places_data:/data/db

  # ---------- Review Service DB ----------
  mongo-review:
    image: mongo:7
    container_name: kampusmap-mongo-review
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongo_review_data:/data/db

  # ---------- Cache (shared) ----------
  redis:
    image: redis:7-alpine
    container_name: kampusmap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ---------- Microservices ----------
  auth-service:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: auth-service
    container_name: kampusmap-auth
    env_file: .env
    environment:
      POSTGRES_AUTH_DSN: postgres://auth_user:auth_pass@postgres-auth:5432/kampusmap_auth?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - postgres-auth
      - redis

  places-service:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: places-service
    container_name: kampusmap-places
    env_file: .env
    environment:
      MONGO_PLACES_URI: mongodb://mongo-places:27017
      REDIS_ADDR: redis:6379
    ports:
      - "8082:8082"   # public HTTP/JSON
      - "9082:9082"   # internal gRPC/protobuf
    depends_on:
      - mongo-places
      - redis

  review-service:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: review-service
    container_name: kampusmap-review
    env_file: .env
    environment:
      MONGO_REVIEW_URI: mongodb://mongo-review:27017
      PLACES_GRPC_ADDR: places-service:9082  # internal hostname dalam network
    ports:
      - "8083:8083"
    depends_on:
      - mongo-review
      - places-service

  api-gateway:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: api-gateway
    container_name: kampusmap-gateway
    env_file: .env
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      PLACES_SERVICE_URL: http://places-service:8082
      REVIEW_SERVICE_URL: http://review-service:8083
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - places-service
      - review-service

volumes:
  postgres_auth_data:
  mongo_places_data:
  mongo_review_data:
  redis_data:
