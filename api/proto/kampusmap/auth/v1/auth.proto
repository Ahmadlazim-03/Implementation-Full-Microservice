syntax = "proto3";

package kampusmap.auth.v1;

option go_package = "backend/gen/proto/kampusmap/auth/v1;authv1";

// AuthService — INTERNAL gRPC contract.
// Disiapkan agar gateway / service lain bisa verifikasi JWT
// tanpa harus tahu detail signing/secret.
service AuthService {
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message User {
  string id = 1;
  string email = 2;
  string name = 3;
  string role = 4;
}

message VerifyTokenRequest {
  string token = 1;
}

message VerifyTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string email = 3;
  string role = 4;
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  User user = 1;
}
